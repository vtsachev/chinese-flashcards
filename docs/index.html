<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Chinese Flashcards</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Source+Sans+3:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <img src="assets/pks-pandas.png" alt="PKS pandas" class="logo">
      <h1>Chinese Flashcards <span class="zh">中文卡片</span></h1>
    </div>
    <div class="tridot" aria-hidden="true"><span></span><span></span><span></span></div>
    <nav id="tabs">
      <button data-view="practice" class="active">Practice</button>
      <button data-view="browse">Browse</button>
      <button data-view="progress">Progress</button>
    </nav>
  </header>

  <main id="app"><!-- views render here --></main>

  <footer>
    <div class="tridot" aria-hidden="true"><span></span><span></span><span></span></div>
  </footer>

  <div id="toast" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
